<script>
    // --- DATABASE MASTER TERBARU ---
    const listTransportir = [
        "PT. KHATULISTIWA SINAR ENERGI",
        "PT. BERKAH SARANA MAKMUR BENUA", 
        "PT. INDO DHARMA ENERGI", 
        "PT. TRANS GLOBAL ENERGI",
        "PT. INVESTAMA KALIMANTAN ENERGI"
    ];

    const dataArmada = [
        { nopol: "KH 8141 GH", tc: "1005", qty: 5000 },
        { nopol: "KH 8139 GM", tc: "1335", qty: 10000 },
        { nopol: "KH 8942 GN", tc: "1154", qty: 5000 },
        { nopol: "KH 8943 GN", tc: "1146", qty: 5000 },
        { nopol: "KH 8273 RM", tc: "1095", qty: 5000 },
        { nopol: "KH 8256 RM", tc: "1043", qty: 5000 },
        { nopol: "KH 8641 GN", tc: "1138", qty: 5000 },
        { nopol: "KH 8206 GN", tc: "1062", qty: 5000 },
        { nopol: "L 9761 UJ", tc: "1240", qty: 8000 }
    ];

    const listDriver = [
        "AGUS", "WIYANTO", "WAHID", "SUPRIYADI", "AGUS WANTO", 
        "NUR KHOLIS", "FARID HABIBI", "RONNY PRASTIANSYAH", 
        "ADI SUCIPTO", "AGUS MULYANTO", "INDRA"
    ];

    // --- KONFIGURASI SUPABASE ---
    const SB_URL = "https://qnamtickoteyvydayyor.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuYW10aWNrb3RleXZ5ZGF5eW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTU2MzksImV4cCI6MjA5MzQ3MTYzOX0.VAeN0JVnz4WNPzY5NTGmtGeHD-Da_qkCvy84ZDYZNHo";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    var qr = new QRCode(document.getElementById("qrcode"), { width: 45, height: 45 });

    function initDatalists() {
        // Isi Dropdown Nopol
        const dlNopol = document.getElementById('data_nopol');
        dlNopol.innerHTML = dataArmada.map(item => `<option value="${item.nopol}">`).join('');

        // Isi Dropdown Transportir
        const dlPT = document.getElementById('data_pt');
        dlPT.innerHTML = listTransportir.map(pt => `<option value="${pt}">`).join('');
        
        // Isi Dropdown Sopir
        const dlSopir = document.getElementById('data_sopir');
        dlSopir.innerHTML = listDriver.map(nama => `<option value="${nama}">`).join('');
    }

    function handleAutoFill(type) {
        const nopolInput = document.getElementById(type === 's' ? 's_nopol' : 't_nopol');
        const nopolVal = nopolInput.value.toUpperCase();
        const match = dataArmada.find(m => m.nopol === nopolVal);

        if (match) {
            // Jika nopol cocok, isi QTY dan TC secara otomatis
            document.getElementById(type + '_qty').value = match.qty;
            if (type === 't') {
                document.getElementById('t_tinggi').value = match.tc;
            }
            // Default PT untuk armada KSE
            if (match.nopol.startsWith('KH')) {
                document.getElementById(type + '_pt').value = "PT. KHATULISTIWA SINAR ENERGI";
            }
        }
    }

    // --- FUNGSI LOGIKA TETAP ---
    function getRomanMonth(month) {
        const roman = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
        return roman[month];
    }

    async function generateDocNumber() {
        const dateInput = document.getElementById('in_tgl_input').value;
        if(!dateInput) return;
        const tgl = new Date(dateInput);
        const bulanRomawi = getRomanMonth(tgl.getMonth());
        const tahun = tgl.getFullYear();

        try {
            const { data, error } = await supabaseClient
                .from('baom_kse')
                .select('no_dokumen')
                .ilike('no_dokumen', `%/${bulanRomawi}/${tahun}%`)
                .order('created_at', { ascending: false })
                .limit(1);

            let nextNum = 1;
            if (data && data.length > 0) {
                const lastNoString = data[0].no_dokumen.split('/')[0].trim();
                nextNum = parseInt(lastNoString) + 1;
            }
            
            const formatNo = `${nextNum.toString().padStart(3, '0')} / BAOM-KSE/${bulanRomawi}/${tahun}`;
            document.getElementById('in_no').value = formatNo;
            updateView();
            updateQR();
        } catch (e) { console.error("Gagal generate nomor:", e.message); }
    }

    async function saveToCloud() {
        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> SAVING...';

        const payload = {
            no_dokumen: document.getElementById('in_no').value,
            tanggal: document.getElementById('in_tgl_input').value,
            unit_penyerah: document.getElementById('s_pt').value,
            unit_penerima: document.getElementById('t_pt').value,
            sopir: document.getElementById('t_sopir').value,
            jumlah: parseFloat(document.getElementById('t_qty').value) || 0,
            nopol_sumber: document.getElementById('s_nopol').value,
            nopol_tujuan: document.getElementById('t_nopol').value,
            segel: document.getElementById('t_segel').value,
            tinggi_cairan: document.getElementById('t_tinggi').value
        };

        try {
            const { error } = await supabaseClient.from('baom_kse').insert([payload]);
            if (error) throw error;
            alert("Data Berhasil Disimpan ke Cloud!");
        } catch (error) { alert("Gagal menyimpan: " + error.message); }
        finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    function formatDateText() {
        const dateInput = document.getElementById('in_tgl_input').value;
        if(!dateInput) return;
        const dateObj = new Date(dateInput);
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        const formatted = dateObj.toLocaleDateString('id-ID', options);
        
        document.getElementById('in_hari').value = ["MINGGU","SENIN","SELASA","RABU","KAMIS","JUMAT","SABTU"][dateObj.getDay()];
        document.getElementById('in_tgl_lengkap').value = `tanggal ${dateObj.getDate()} bulan ${formatted.split(' ')[1]} tahun ${dateObj.getFullYear()}`;
        document.getElementById('out_tgl_footer').innerText = formatted;
        document.getElementById('out_tgl_header').innerText = formatted;
        updateView();
    }

    function updateView() {
        const mapping = {
            'in_no': 'out_no', 'in_hari': 'out_hari', 'in_tgl_lengkap': 'out_tgl_lengkap',
            's_nopol': 'os_nopol', 's_pt': 'os_pt', 's_sopir': 'os_sopir',
            't_nopol': 'ot_nopol', 't_pt': 'ot_pt', 't_sopir': 'ot_sopir',
            't_segel': 'ot_segel', 'in_sig_operasional': 'out_operasional_sig', 'in_lokasi': 'out_lokasi'
        };

        for (let id in mapping) {
            const target = document.getElementById(mapping[id]);
            const source = document.getElementById(id);
            if(target && source) target.innerText = source.value;
        }

        document.getElementById('out_lokasi_footer').innerText = document.getElementById('in_lokasi').value;
        document.getElementById('os_sopir_sig').innerText = document.getElementById('s_sopir').value;
        document.getElementById('ot_sopir_sig').innerText = document.getElementById('t_sopir').value;
        document.getElementById('os_qty').innerText = (document.getElementById('s_qty').value || "0") + " LITER";
        document.getElementById('ot_qty').innerText = (document.getElementById('t_qty').value || "0") + " LITER";
        document.getElementById('ot_tinggi').innerText = (document.getElementById('t_tinggi').value || "-") + " MM";
        
        const now = new Date();
        document.getElementById('print-timestamp').innerText = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}, ${now.getHours()}.${now.getMinutes().toString().padStart(2,'0')}`;
        updateQR();
    }

    function updateQR() { qr.makeCode(document.getElementById('in_no').value || "KSE-DOCUMENT"); }

    function downloadPDF() {
        const element = document.getElementById('pdf-area');
        const opt = { 
            margin: 0, 
            filename: `BAOM_${document.getElementById('in_no').value.replace(/\//g, '_')}.pdf`, 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: [215, 278], orientation: 'portrait' } 
        };
        html2pdf().set(opt).from(element).save();
    }

    window.onload = () => {
        initDatalists();
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('in_tgl_input').value = today;
        formatDateText();
        setTimeout(generateDocNumber, 800);
    };
</script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Shipping Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --text-dark: #334155;
            --text-light: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-dark); }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: var(--white); padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;
        }
        .login-card h2 { margin-bottom: 1.5rem; color: var(--primary); }
        .login-card input {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            border: 1px solid #e2e8f0; border-radius: 6px; outline: none;
        }
        .login-card button {
            width: 100%; padding: 12px; background: var(--accent);
            color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
        }

        /* --- Main Dashboard --- */
        #main-dashboard { display: none; min-height: 100vh; }

        /* Sidebar */
        nav {
            width: 260px; background: var(--primary); color: white;
            padding: 2rem 1.5rem; height: 100vh; position: fixed;
        }
        .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 3rem; color: var(--accent); }
        .menu-item {
            display: flex; align-items: center; padding: 12px;
            margin-bottom: 0.5rem; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: var(--accent); }
        .menu-item i { margin-right: 12px; }

        /* Main Content */
        main { margin-left: 260px; padding: 2rem; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;
        }
        .content-card {
            background: var(--white); padding: 2rem; border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .badge {
            background: #dcfce7; color: #166534; padding: 4px 12px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <i data-lucide="shield-check" style="width: 48px; height: 48px; color: var(--accent); margin-bottom: 1rem;"></i>
            <h2>Secure Access</h2>
            <input type="password" id="password" placeholder="Masukkan Password Admin">
            <button onclick="checkPassword()">Login</button>
            <p id="error-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none;">Password salah!</p>
        </div>
    </div>

    <div id="main-dashboard">
        <nav>
            <div class="logo">LOGISTIC.PRO</div>
            <div class="menu-item active" onclick="showSection('ikaen', this)">
                <i data-lucide="package"></i> Surat Jalan Ikaen
            </div>
            <div class="menu-item" onclick="showSection('kse', this)">
                <i data-lucide="truck"></i> Surat Jalan KSE
            </div>
            <div class="menu-item" onclick="showSection('ide', this)">
                <i data-lucide="file-text"></i> Surat Jalan IDE
            </div>
            <div style="margin-top: auto;" class="menu-item" onclick="location.reload()">
                <i data-lucide="log-out"></i> Logout
            </div>
        </nav>

        <main>
            <header>
                <h1 id="page-title">Surat Jalan Ikaen</h1>
                <div class="badge">Sistem Aktif</div>
            </header>

            <section class="content-card">
                <div id="content-body">
                    <h3>Data Pengiriman Terbaru</h3>
                    <p style="color: var(--text-light); margin-top: 8px;">Memuat data spesifik untuk departemen ini...</p>
                    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #f1f5f9;">
                    <div style="height: 200px; display: flex; align-items: center; justify-content: center; border: 2px dashed #e2e8f0; border-radius: 8px;">
                        <p style="color: #cbd5e1;">Belum ada dokumen yang diunggah.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Inisialisasi Ikon
        lucide.createIcons();

        // Keamanan Sederhana (Ganti 'admin123' dengan password Anda)
        function checkPassword() {
            const pass = document.getElementById('password').value;
            if (pass === 'admin123') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Navigasi Menu
        function showSection(section, element) {
            // Update Title
            const title = document.getElementById('page-title');
            title.innerText = "Surat Jalan " + section.toUpperCase();

            // Update Active Menu
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // Logic tambahan bisa ditambahkan di sini untuk memuat data berbeda
            console.log("Memuat data untuk: " + section);
        }
    </script>
</body>
</html>

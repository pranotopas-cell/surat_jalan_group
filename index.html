<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDE System | Supabase Connector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f4f7f9; font-family: 'Inter', sans-serif; padding: 40px 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #1565c0; border: none; padding: 10px 25px; border-radius: 8px; }
        .table thead { background-color: #0d2137; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2"></i>Input Data Rilis</h5>
                <form id="formPengiriman">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Tanggal</label>
                        <input type="date" id="tanggal" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">No. Surat Jalan</label>
                        <input type="text" id="no_sj" class="form-control" placeholder="SJ/IDE/001" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">No. BA Serah Terima</label>
                        <input type="text" id="no_ba_serah" class="form-control" placeholder="BA/ST/001">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">No. Memo</label>
                        <input type="text" id="no_memo" class="form-control" placeholder="MEMO/IDE/001">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">No. Oper Muatan</label>
                        <input type="text" id="no_oper_muatan" class="form-control" placeholder="OP/IDE/001">
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="btnSimpan">
                        <i class="bi bi-cloud-arrow-up me-2"></i>Simpan ke Supabase
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0"><i class="bi bi-table me-2"></i>Data Rilis Terbaru</h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="fetchData()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>No. SJ</th>
                                <th>BA Serah</th>
                                <th>Memo</th>
                                <th>Oper Muatan</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. KONFIGURASI SUPABASE (Ganti dengan data Anda)
    const SB_URL = "https://YOUR_PROJECT_URL.supabase.co"; 
    const SB_KEY = "YOUR_ANON_PUBLIC_KEY";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // 2. FUNGSI AMBIL DATA (SELECT)
    async function fetchData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Memuat data...</td></tr>';

        const { data, error } = await _supabase
            .from('pengiriman') // Nama tabel di database
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error: ${error.message}</td></tr>`;
            return;
        }

        let html = '';
        data.forEach(row => {
            html += `
                <tr>
                    <td>${row.tanggal}</td>
                    <td><span class="badge bg-info text-dark">${row.no_sj}</span></td>
                    <td>${row.no_ba_serah || '-'}</td>
                    <td>${row.no_memo || '-'}</td>
                    <td>${row.no_oper_muatan || '-'}</td>
                </tr>
            `;
        });
        tbody.innerHTML = html || '<tr><td colspan="5" class="text-center">Tidak ada data.</td></tr>';
    }

    // 3. FUNGSI SIMPAN DATA (INSERT)
    document.getElementById('formPengiriman').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...';

        const payload = {
            tanggal: document.getElementById('tanggal').value,
            no_sj: document.getElementById('no_sj').value,
            no_ba_serah: document.getElementById('no_ba_serah').value,
            no_memo: document.getElementById('no_memo').value,
            no_oper_muatan: document.getElementById('no_oper_muatan').value
        };

        const { error } = await _supabase
            .from('pengiriman')
            .insert([payload]);

        if (error) {
            alert("Gagal menyimpan: " + error.message);
        } else {
            alert("Data Berhasil Dirilis!");
            document.getElementById('formPengiriman').reset();
            fetchData(); // Refresh tabel
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-cloud-arrow-up me-2"></i>Simpan ke Supabase';
    });

    // Jalankan ambil data saat halaman dimuat
    window.onload = fetchData;
</script>

</body>
</html>

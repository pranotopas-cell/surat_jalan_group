<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DELIVERY | Enterprise Suite </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #2563eb;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.4);
            --navy: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            min-height: 100vh;
            color: var(--navy);
            background: linear-gradient(45deg, #e0e7ff, #f1f5f9, #dbeafe, #e8e8e8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .login-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            padding: 4rem; border-radius: 45px; width: 520px; 
            border: 1px solid var(--border);
            text-align: center;
        }

        .vendor-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            margin-bottom: 2.5rem; background: rgba(255,255,255,0.4);
            padding: 20px; border-radius: 25px;
        }
        .vendor-logo { width: 100%; height: 55px; object-fit: contain; }

        .login-card input {
            width: 100%; padding: 20px; border-radius: 22px; border: 1px solid #cbd5e1;
            margin-bottom: 1.5rem; background: white; font-size: 1.3rem; text-align: center; font-weight: 800;
        }

        /* --- SIDEBAR NAV --- */
        nav {
            width: 320px; background: rgba(255,255,255,0.6); backdrop-filter: blur(25px);
            border-right: 1px solid var(--border); padding: 2.5rem 1.2rem; 
            height: 100vh; position: fixed; display: flex; flex-direction: column;
            overflow-y: auto;
        }

        .logo-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; font-weight: 800; font-size: 1.4rem; color: var(--accent); padding-left: 10px; }
        
        .dept-group { margin-bottom: 1.5rem; }
        
        .dept-label { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; cursor: pointer; border-radius: 20px;
            color: var(--navy); font-weight: 800; transition: 0.3s;
            background: rgba(255,255,255,0.4); margin-bottom: 5px;
        }
        .dept-label:hover { background: rgba(37, 99, 235, 0.1); }
        .dept-label.active { background: var(--accent); color: white; }

        .sub-menu { padding-left: 15px; margin-bottom: 10px; display: none; }
        .sub-menu.show { display: block; }

        .sub-item {
            display: flex; align-items: center; padding: 12px 18px; margin-top: 5px;
            cursor: pointer; border-radius: 15px; color: var(--text-muted);
            font-size: 0.9rem; font-weight: 700; transition: 0.3s;
        }
        .sub-item:hover { background: white; color: var(--accent); padding-left: 25px; }
        .sub-item i { margin-right: 10px; width: 16px; }

        /* --- MAIN CONTENT --- */
        main { flex: 1; margin-left: 320px; padding: 4rem; }
        .header-content { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        .header-content h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -2px; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(30px);
            border-radius: 40px; padding: 2.5rem; border: 1px solid var(--border);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 0 20px 10px; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; text-align: left; }
        td { padding: 22px 20px; background: rgba(255,255,255,0.4); font-weight: 700; }
        td:first-child { border-radius: 20px 0 0 20px; border-left: 1px solid var(--border); color: var(--accent); }
        td:last-child { border-radius: 0 20px 20px 0; border-right: 1px solid var(--border); }

        .badge { background: #dcfce7; color: #15803d; padding: 6px 14px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 2.5rem;">Secure Access</h2>
            <div class="vendor-grid">
                <img src="ikaen.png" class="vendor-logo">
                <img src="header1.png" class="vendor-logo">
                <img src="ide1.png" class="vendor-logo">
            </div>
            <input type="password" id="pass-input" placeholder="ENTER PIN">
            <button onclick="handleLogin()" style="width: 100%; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 22px; font-weight: 800; cursor: pointer;">Sign In</button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav>
            <div class="logo-nav"><i data-lucide="shield-check"></i> DELIVERY.PRO</div>
            
            <div class="dept-group">
                <div class="dept-label" id="label-ikaen" onclick="toggleDept('ikaen')">
                    <span>IKAEN</span> <i data-lucide="chevron-down"></i>
                </div>
                <div class="sub-menu" id="menu-ikaen">
                    <div class="sub-item" onclick="goTo('ikaen', 'sj')"><i data-lucide="file-text"></i> Surat Jalan</div>
                    <div class="sub-item" onclick="goTo('ikaen', 'ba_terima')"><i data-lucide="clipboard-check"></i> BA Penerimaan</div>
                    <div class="sub-item" onclick="goTo('ikaen', 'ba_oper')"><i data-lucide="refresh-cw"></i> BA Oper Tangki</div>
                    <div class="sub-item" onclick="goTo('ikaen', 'memo')"><i data-lucide="mail"></i> Memo</div>
                </div>
            </div>

            <div class="dept-group">
                <div class="dept-label" id="label-ide" onclick="toggleDept('ide')">
                    <span>IDE</span> <i data-lucide="chevron-down"></i>
                </div>
                <div class="sub-menu" id="menu-ide">
                    <div class="sub-item" onclick="goTo('ide', 'sj')"><i data-lucide="file-text"></i> Surat Jalan</div>
                    <div class="sub-item" onclick="goTo('ide', 'ba_terima')"><i data-lucide="clipboard-check"></i> BA Penerimaan</div>
                    <div class="sub-item" onclick="goTo('ide', 'ba_oper')"><i data-lucide="refresh-cw"></i> BA Oper Tangki</div>
                    <div class="sub-item" onclick="goTo('ide', 'memo')"><i data-lucide="mail"></i> Memo</div>
                </div>
            </div>

            <div class="dept-group">
                <div class="dept-label" id="label-kse" onclick="toggleDept('kse')">
                    <span>KSE</span> <i data-lucide="chevron-down"></i>
                </div>
                <div class="sub-menu" id="menu-kse">
                    <div class="sub-item" onclick="goTo('kse', 'sj')"><i data-lucide="file-text"></i> Surat Jalan</div>
                    <div class="sub-item" onclick="goTo('kse', 'ba_terima')"><i data-lucide="clipboard-check"></i> BA Penerimaan</div>
                    <div class="sub-item" onclick="goTo('kse', 'ba_oper')"><i data-lucide="refresh-cw"></i> BA Oper Tangki</div>
                    <div class="sub-item" onclick="goTo('kse', 'memo')"><i data-lucide="mail"></i> Memo</div>
                </div>
            </div>

            <div style="margin-top: auto; padding: 20px;">
                <button onclick="location.reload()" style="width:100%; padding:15px; border-radius:15px; border:none; background:rgba(239,68,68,0.1); color:#ef4444; font-weight:800; cursor:pointer;">Logout</button>
            </div>
        </nav>

        <main>
            <div class="header-content">
                <div>
                    <h1 id="view-title">Dashboard IKAEN</h1>
                    <p style="color: var(--text-muted); font-weight: 700;">Riwayat 10 Surat Jalan Terakhir</p>
                </div>
            </div>

            <div class="glass-panel">
                <table>
                    <thead>
                        <tr>
                            <th>ID Manifest</th>
                            <th>Tanggal</th>
                            <th>Driver</th>
                            <th>Tujuan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="manifest-table"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let currentDept = 'ikaen';

        function handleLogin() {
            if(document.getElementById('pass-input').value === 'admin123') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                toggleDept('ikaen'); // Open IKAEN by default
            } else { alert('PIN Salah!'); }
        }

        // Fungsi Buka/Tutup Accordion Menu
        function toggleDept(dept) {
            currentDept = dept;
            
            // UI Toggle
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dept-label').forEach(l => l.classList.remove('active'));
            
            document.getElementById(`menu-${dept}`).classList.add('show');
            document.getElementById(`label-${dept}`).classList.add('active');
            
            // Update Dashboard Table Header
            document.getElementById('view-title').innerText = "Dashboard " + dept.toUpperCase();
            renderManifest();
        }

        // Fungsi Navigasi ke File Spesifik
        function goTo(dept, type) {
            // Contoh: sj_ikaen.html, ba_terima_ikaen.html, ba_oper_ikaen.html, memo.ikaen.html
            window.location.href = `${type}_${dept}.html`;
        }

        // Render 10 Data Terakhir dari LocalStorage
        function renderManifest() {
            const data = JSON.parse(localStorage.getItem(`db_${currentDept}`)) || [];
            const recentData = data.slice(-10).reverse();
            const tableBody = document.getElementById('manifest-table');
            
            if(recentData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:4rem; opacity:0.5;">Belum ada riwayat surat jalan untuk ${currentDept.toUpperCase()}.</td></tr>`;
            } else {
                tableBody.innerHTML = recentData.map(item => `
                    <tr>
                        <td>#${item.no || '---'}</td>
                        <td>${item.tgl || '---'}</td>
                        <td>${item.driver || '---'}</td>
                        <td>${item.tujuan || '---'}</td>
                        <td><span class="badge">RECORDED</span></td>
                    </tr>
                `).join('');
            }
        }
    </script>
</body>
</html>

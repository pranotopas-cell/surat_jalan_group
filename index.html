<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGISTIC.PRO | Enterprise Shipping Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --success: #10b981;
            --bg-body: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed; inset: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-card {
            background: var(--white); padding: 3rem; border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 100%; max-width: 420px; text-align: center;
        }
        .login-card input {
            width: 100%; padding: 14px; margin-bottom: 1.2rem;
            border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none;
        }
        .login-card button {
            width: 100%; padding: 14px; background: var(--accent);
            color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600;
        }

        /* --- Dashboard Layout --- */
        #main-dashboard { display: none; min-height: 100vh; }

        nav {
            width: var(--sidebar-width); background: var(--primary); color: white;
            padding: 2rem 1.2rem; height: 100vh; position: fixed;
            display: flex; flex-direction: column;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; padding: 0 12px 3rem; }
        .logo-icon { background: var(--accent); padding: 8px; border-radius: 8px; }
        
        .menu-item {
            display: flex; align-items: center; padding: 12px 16px;
            margin-bottom: 0.4rem; cursor: pointer; border-radius: 10px; 
            transition: all 0.2s; color: #94a3b8; text-decoration: none;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .menu-item.active { background: var(--accent); color: white; }

        main { flex: 1; margin-left: var(--sidebar-width); padding: 2.5rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }

        /* --- Components --- */
        .content-card {
            background: var(--white); padding: 2rem; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-box { background: var(--white); padding: 1.5rem; border-radius: 12px; border: 1px solid #f1f5f9; }

        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #f8fafc; color: var(--text-muted); font-size: 0.85rem; }
        td { padding: 16px 12px; border-bottom: 1px solid #f8fafc; font-size: 0.9rem; }
        
        .status-pill {
            padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
            background: #dcfce7; color: #166534;
        }

        .btn-primary {
            padding: 10px 20px; border-radius: 8px; background: var(--accent);
            color: white; border: none; cursor: pointer; font-weight: 600; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <i data-lucide="shield-check" style="width: 48px; height: 48px; color: var(--accent); margin-bottom: 1rem;"></i>
            <h2>Secure Access</h2>
            <input type="password" id="password" placeholder="Admin Password" onkeypress="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()">Login Ke Sistem</button>
            <p id="error-msg" style="color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none;">Password Salah!</p>
        </div>
    </div>

    <div id="main-dashboard">
        <nav>
            <div class="logo-container">
                <div class="logo-icon"><i data-lucide="truck" style="color: white;"></i></div>
                <div class="logo-text" style="font-weight: 800; font-size: 1.2rem;">LOGISTIC.PRO</div>
            </div>
            
            <div class="menu-item active" id="btn-ikaen" onclick="changeDept('ikaen')">
                <i data-lucide="package"></i> <span>Surat Jalan Ikaen</span>
            </div>
            <div class="menu-item" id="btn-kse" onclick="changeDept('kse')">
                <i data-lucide="container"></i> <span>Surat Jalan KSE</span>
            </div>
            <div class="menu-item" id="btn-ide" onclick="changeDept('ide')">
                <i data-lucide="file-text"></i> <span>Surat Jalan IDE</span>
            </div>

            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="menu-item" onclick="location.reload()" style="color: #fda4af;">
                    <i data-lucide="log-out"></i> <span>Logout</span>
                </div>
            </div>
        </nav>

        <main>
            <header>
                <div>
                    <h1 id="page-title">Surat Jalan Ikaen</h1>
                    <p style="color: var(--text-muted);">Monitoring pengiriman logistik real-time</p>
                </div>
                <a href="sj_ikaen.html" id="btn-create-new" class="btn-primary">
                    <i data-lucide="plus-circle" style="width: 18px;"></i> Buat Baru
                </a>
            </header>

            <div class="stats-grid">
                <div class="stat-box">
                    <small>Total Dokumen</small>
                    <h2 id="stat-total">--</h2>
                </div>
                <div class="stat-box">
                    <small>Pending</small>
                    <h2 style="color: #f59e0b;">12</h2>
                </div>
                <div class="stat-box">
                    <small>Selesai</small>
                    <h2 style="color: var(--success);">144</h2>
                </div>
            </div>

            <section class="content-card">
                <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                    <i data-lucide="list"></i> Manifest Dokumen
                </h3>
                <div id="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID MANIFEST</th>
                                <th>TANGGAL</th>
                                <th>TUJUAN</th>
                                <th>DRIVER</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="data-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Status Departemen Aktif
        let currentDept = 'ikaen';

        function checkPassword() {
            const pass = document.getElementById('password').value;
            if (pass === 'admin123') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'flex';
                changeDept('ikaen'); // Load default
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function changeDept(dept) {
            currentDept = dept;
            
            // 1. Update UI Sidebar
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${dept}`).classList.add('active');

            // 2. Update Header & Link "Buat Baru"
            const title = document.getElementById('page-title');
            const createBtn = document.getElementById('btn-create-new');
            
            title.innerText = "Surat Jalan " + dept.toUpperCase();
            createBtn.href = `sj_${dept}.html`; // Mengarahkan ke file html masing-masing

            // 3. Load Data Table
            renderTable(dept);
        }

        function renderTable(dept) {
            const tbody = document.getElementById('data-body');
            const total = document.getElementById('stat-total');
            const prefix = dept.toUpperCase();
            
            // Simulasi jumlah data
            const count = Math.floor(Math.random() * 50) + 20;
            total.innerText = count;

            let rows = '';
            for(let i = 1; i <= 6; i++) {
                rows += `
                    <tr>
                        <td style="font-weight: 600;">DOC/${prefix}/2026/0${i}</td>
                        <td>26 Feb 2026</td>
                        <td>Area Distribusi ${i}</td>
                        <td>Driver Unit ${i}</td>
                        <td><span class="status-pill">Delivered</span></td>
                    </tr>
                `;
            }
            tbody.innerHTML = rows;
        }
    </script>
</body>
</html>

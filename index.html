<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Integrated Delivery System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-dark: #0f172a;
            --sidebar-bg: #111827;
            --sidebar-width: 280px;
            --ind-red: #ff4d4d; /* Merah lebih terang agar kontras */
            --ind-blue: #3b82f6; 
            --ind-gold: #fbbf24;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; }

        /* Login & Sidebar Style Tetap */
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1565034946487-077786996e27?auto=format&fit=crop'); background-size: cover; }
        .login-card { background: rgba(30, 41, 59, 0.9); border: 1px solid var(--ind-blue); border-radius: 1.5rem; width: 400px; padding: 2.5rem; }
        .sidebar { background: var(--sidebar-bg); height: 100vh; width: var(--sidebar-width); position: fixed; border-right: 1px solid var(--ind-blue); overflow-y: auto; z-index: 1000; padding: 1.5rem 1rem; }
        .nav-link { color: rgba(255,255,255,0.6); padding: 0.7rem 1rem; border-radius: 10px; text-decoration: none; display: flex; align-items: center; font-size: 0.85rem; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: var(--ind-blue); }
        .pt-label { font-size: 0.6rem; color: #64748b; padding: 1rem 1rem 0.2rem; font-weight: 800; letter-spacing: 1px; }

        /* Content Area */
        .main-content { margin-left: var(--sidebar-width); padding: 2rem; min-height: 100vh; }
        .top-nav { margin-left: var(--sidebar-width); padding: 1rem 2rem; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: flex-end; position: sticky; top: 0; z-index: 999; }
        
        /* Table Optimization */
        .card-table { background: rgba(30, 41, 59, 0.5); border-radius: 15px; border: 1px solid var(--glass-border); padding: 1.5rem; }
        .table { font-size: 0.75rem; vertical-align: middle; }
        .table thead th { color: #94a3b8; font-size: 0.65rem; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); padding: 12px; }
        .table tbody td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; }

        /* PEWARNAAN KHUSUS */
        .bg-ikaen { background-color: var(--ind-red) !important; color: white !important; }
        .text-ikaen { color: var(--ind-red) !important; font-weight: 700; }

        .bg-ide { background-color: var(--ind-blue) !important; color: white !important; }
        .text-ide { color: var(--ind-blue) !important; font-weight: 700; }

        .bg-kse { background-color: var(--ind-gold) !important; color: #000 !important; font-weight: 700; }
        .text-kse { color: var(--ind-gold) !important; font-weight: 700; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card text-center">
        <i class="bi bi-shield-lock-fill text-primary fs-1 mb-3"></i>
        <h4 class="fw-bold mb-4 text-white">ENTERPRISE LOGIN</h4>
        <input type="text" id="user" class="form-control mb-3 bg-dark border-secondary text-white" placeholder="Username">
        <input type="password" id="pass" class="form-control mb-4 bg-dark border-secondary text-white" placeholder="Password">
        <button class="btn btn-primary w-100 fw-bold" onclick="handleLogin()">LOGIN SYSTEM</button>
        <p id="error-msg" class="text-danger mt-3 small" style="display:none;">Akses Ditolak!</p>
    </div>
</div>

<div id="dashboard-page" style="display:none;">
    <aside class="sidebar">
        <div class="px-3 mb-4"><h6 class="fw-bold text-white"><i class="bi bi-cpu-fill me-2"></i>E-LOGISTICS</h6></div>
        <nav>
            <a href="#" class="nav-link active mb-3"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <small class="pt-label">PT. IKAEN</small>
            <a href="#" class="nav-link"><i class="bi bi-file-earmark-text me-2"></i> Dokumen IKAEN</a>
            <small class="pt-label">PT. IDE</small>
            <a href="#" class="nav-link"><i class="bi bi-droplet me-2"></i> Dokumen IDE</a>
            <small class="pt-label">PT. KSE</small>
            <a href="#" class="nav-link"><i class="bi bi-lightning me-2"></i> Dokumen KSE</a>
        </nav>
    </aside>

    <header class="top-nav">
        <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()"><i class="bi bi-power"></i> LOGOUT</button>
    </header>

    <main class="main-content">
        <div class="card card-table">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="fw-bold text-white m-0">LIVE LOGISTICS FEED</h6>
                <button class="btn btn-sm btn-primary px-3" onclick="fetchLogistikData()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>IDENTITAS</th>
                            <th>NO. DOKUMEN</th>
                            <th>JENIS</th>
                            <th>TUJUAN</th>
                            <th>SOPIR / NOPOL</th>
                            <th class="text-end">QTY (L)</th>
                        </tr>
                    </thead>
                    <tbody id="logistik-table-body">
                        <tr><td colspan="6" class="text-center py-5">Menghubungkan ke server...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const SB_URL = "https://ntaectphgoelmhzrkatp.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function fetchLogistikData() {
        const tbody = document.getElementById('logistik-table-body');
        try {
            const { data, error } = await _supabase.from('data_logistik').select('*').order('created_at', { ascending: false });
            if (error) throw error;

            let html = '';
            data.forEach(row => {
                // Logika Penentuan Warna (Case Insensitive & Fuzzy)
                let bCls = 'bg-secondary';
                let tCls = 'text-white';
                const ptName = (row.pt || '').toUpperCase();

                if (ptName.includes('IKAEN') || ptName.includes('INVESTAMA') || ptName.includes('IKNV')) {
                    bCls = 'bg-ikaen'; tCls = 'text-ikaen';
                } else if (ptName.includes('IDE') || ptName.includes('DHARMA')) {
                    bCls = 'bg-ide'; tCls = 'text-ide';
                } else if (ptName.includes('KSE') || ptName.includes('KHATULISTIWA')) {
                    bCls = 'bg-kse'; tCls = 'text-kse';
                }

                html += `
                    <tr>
                        <td>
                            <div class="d-flex flex-column">
                                <span class="badge ${bCls} mb-1" style="width:fit-content; font-size:10px;">${ptName}</span>
                                <small class="text-secondary" style="font-size:10px;">${row.tanggal || '-'}</small>
                            </div>
                        </td>
                        <td class="${tCls}">${row.no_dokumen || '-'}</td>
                        <td class="text-white-50">${row.jenis_dokumen || '-'}</td>
                        <td style="max-width:150px;" class="text-truncate">${row.tujuan || '-'}</td>
                        <td>
                            <div class="d-flex flex-column">
                                <span class="text-white fw-bold">${row.sopir || '-'}</span>
                                <span class="text-primary" style="font-size:10px;">${row.nopol || '-'}</span>
                            </div>
                        </td>
                        <td class="text-end fw-bold text-info">${Number(row.qty || 0).toLocaleString('id-ID')}</td>
                    </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="6" class="text-center">Data kosong.</td></tr>';
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Gagal Tarik Data: ${err.message}</td></tr>`;
        }
    }

    // Login & Session Logic
    function handleLogin() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "kse123") {
            localStorage.setItem('ide_session', 'active');
            showDashboard();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }
    function showDashboard() {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        fetchLogistikData();
    }
    function handleLogout() { localStorage.removeItem('ide_session'); location.reload(); }
    window.onload = () => { if (localStorage.getItem('ide_session') === 'active') showDashboard(); };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

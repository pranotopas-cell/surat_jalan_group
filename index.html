<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DELIVERY | Cyber Suite </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00f2ff; /* Electric Tosca */
            --secondary: #0066ff; /* Deep Blue */
            --accent: #7000ff; /* Neon Purple */
            --bg-dark: #020617;
            --glass: rgba(7, 15, 30, 0.8);
            --glass-border: rgba(0, 242, 255, 0.2);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            min-height: 100vh;
            color: var(--text-main);
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 102, 255, 0.08) 0%, transparent 35%),
                var(--bg-dark);
            overflow-x: hidden;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; 
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            padding: 20px;
            transition: 0.5s;
        }

        .login-card { 
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 3rem 2rem; border-radius: 40px; width: 100%; max-width: 420px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            text-align: center;
            position: relative;
        }

        .login-card input {
            width: 100%; padding: 18px; border-radius: 16px; 
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4);
            margin-bottom: 1.5rem; font-size: 1.2rem; text-align: center; 
            font-weight: 700; color: var(--primary); letter-spacing: 6px;
            outline: none; transition: 0.3s;
        }
        .login-card input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        /* --- SIDEBAR NAV --- */
        nav {
            width: 280px; background: var(--glass); backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border); padding: 2.5rem 1.2rem; 
            height: 100vh; position: fixed; display: flex; flex-direction: column;
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-nav { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 3.5rem; 
            font-weight: 800; font-size: 1.2rem; color: white; padding-left: 10px;
        }
        
        .dept-label { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; cursor: pointer; border-radius: 18px;
            color: var(--text-dim); font-weight: 700; transition: 0.3s;
            background: rgba(255, 255, 255, 0.02); margin-bottom: 8px;
            border: 1px solid transparent;
        }
        .dept-label:hover { background: rgba(0, 242, 255, 0.05); color: var(--primary); }
        .dept-label.active { 
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.15), transparent); 
            color: var(--primary); border-left: 4px solid var(--primary);
            border-top: 1px solid var(--glass-border);
        }

        .sub-menu { padding-left: 15px; margin-bottom: 15px; display: none; }
        .sub-menu.show { display: block; }

        .sub-item {
            display: flex; align-items: center; padding: 12px 15px; margin-top: 4px;
            cursor: pointer; border-radius: 12px; color: var(--text-dim);
            font-size: 0.85rem; font-weight: 600; transition: 0.3s;
        }
        .sub-item:hover { color: var(--primary); background: rgba(0, 242, 255, 0.05); transform: translateX(5px); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; margin-left: 280px; padding: 4rem; min-height: 100vh; }
        
        .header-content h1 { 
            font-size: 2.5rem; font-weight: 800; color: white;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 32px; padding: 2rem; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-top: 2rem;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; min-width: 800px; }
        th { padding: 15px 25px; color: var(--primary); font-size: 0.75rem; text-transform: uppercase; text-align: left; letter-spacing: 2px; }
        td { padding: 20px 25px; background: rgba(255,255,255,0.03); font-weight: 500; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); }
        td:first-child { border-radius: 16px 0 0 16px; color: var(--primary); font-weight: 800; }
        td:last-child { border-radius: 0 16px 16px 0; }

        .status-pulse {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 20px; background: rgba(0, 242, 255, 0.1);
            color: var(--primary); font-size: 0.7rem; font-weight: 800;
            border: 1px solid var(--glass-border);
        }

        .pulse-dot {
            width: 6px; height: 6px; background: var(--primary); border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <div style="background: linear-gradient(135deg, var(--secondary), var(--primary)); width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);">
                <i data-lucide="shield-check" style="color: white; width: 40px; height: 40px;"></i>
            </div>
            <h2 style="margin-bottom: 0.5rem; color: white; font-weight: 800; letter-spacing: 1px;">CORE ACCESS</h2>
            <p style="margin-bottom: 2.5rem; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 2px;">SECURE LOGISTICS GATEWAY</p>
            
            <input type="password" id="pass-input" placeholder="••••" onkeypress="if(event.key==='Enter') handleLogin()">
            <button onclick="handleLogin()" style="width: 100%; background: linear-gradient(to right, var(--secondary), var(--primary)); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s;">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav id="sidebar">
            <div class="logo-nav">
                <div style="width: 35px; height: 35px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="box" style="color: var(--bg-dark); width: 20px;"></i>
                </div>
                <span>CYBER<span style="color: var(--primary)">SUITE</span></span>
            </div>
            
            <div class="dept-group">
                <div class="dept-label" id="label-ikaen" onclick="toggleDept('ikaen')">
                    <span>IKAEN</span> <i data-lucide="chevron-right" size="16"></i>
                </div>
                <div class="sub-menu" id="menu-ikaen">
                    <div class="sub-item" onclick="fetchManifests('ikaen')"><i data-lucide="file-text"></i> Surat Jalan</div>
                </div>
            </div>

            <div class="dept-group">
                <div class="dept-label" id="label-ide" onclick="toggleDept('ide')">
                    <span>IDE</span> <i data-lucide="chevron-right" size="16"></i>
                </div>
                <div class="sub-menu" id="menu-ide">
                    <div class="sub-item" onclick="fetchManifests('ide')"><i data-lucide="file-text"></i> Surat Jalan</div>
                </div>
            </div>

            <div class="dept-group">
                <div class="dept-label" id="label-kse" onclick="toggleDept('kse')">
                    <span>KSE</span> <i data-lucide="chevron-right" size="16"></i>
                </div>
                <div class="sub-menu" id="menu-kse">
                    <div class="sub-item" onclick="fetchManifests('kse')"><i data-lucide="file-text"></i> Surat Jalan</div>
                </div>
            </div>

            <div style="margin-top: auto;">
                <button onclick="location.reload()" style="width:100%; padding:15px; border-radius:16px; border:1px solid rgba(255,62,62,0.2); background:rgba(255,62,62,0.05); color:#ff3e3e; font-weight:700; cursor:pointer; display: flex; align-items:center; justify-content:center; gap:10px;">
                    <i data-lucide="log-out" size="16"></i> DISCONNECT
                </button>
            </div>
        </nav>

        <main>
            <div class="header-content">
                <h1 id="view-title">Dashboard</h1>
                <p style="color: var(--text-dim); margin-top: 8px;">
                    <span style="color: var(--primary)">✦</span> Terhubung ke Database Supabase Cloud
                </p>
            </div>

            <div class="glass-panel">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>SJ / Memo</th>
                            <th>Driver / Nopol</th>
                            <th>Tujuan</th>
                            <th>Qty</th>
                            <th>Tanggal</th>
                        </tr>
                    </thead>
                    <tbody id="manifest-table">
                        <tr><td colspan="5" style="text-align:center; padding:4rem; color:var(--text-dim);">PILIH PT DI SIDEBAR UNTUK MELIHAT DATA</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SB_URL = "https://ntaectphgoelmhzrkatp.supabase.co"; // URL harus lengkap dengan https://
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg";
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        lucide.createIcons();
        let currentDept = '';

        // --- FUNGSI LOGIN ---
        function handleLogin() {
            const pass = document.getElementById('pass-input').value;
            if(pass === 'admin123') {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    lucide.createIcons();
                }, 500);
            } else {
                alert('ACCESS DENIED: INVALID KEY');
            }
        }

        // --- FUNGSI AMBIL DATA BERDASARKAN PT ---
        async function fetchManifests(dept) {
            const tableBody = document.getElementById('manifest-table');
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:4rem; color:var(--text-dim);">SYNCHRONIZING ${dept.toUpperCase()} DATA...</td></tr>`;

            try {
                // Menentukan tabel mana yang akan ditarik
                const tableName = `data_${dept}`;
                
                const { data, error } = await supabaseClient
                    .from(tableName)
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:4rem; color:var(--text-dim);">Tidak ada data di tabel ${tableName}</td></tr>`;
                    return;
                }

                tableBody.innerHTML = data.map(item => `
                    <tr>
                        <td>
                            <div style="font-weight:800; color:var(--primary)">SJ: ${item.no_surat_jalan || '-'}</div>
                            <div style="font-size:0.7rem; color:var(--text-dim)">Memo: ${item.no_memo || '-'}</div>
                        </td>
                        <td>
                            <div style="color:white;">${item.nama_sopir}</div>
                            <div style="font-size:0.75rem; color:var(--primary)">${item.nopol}</div>
                        </td>
                        <td>${item.tujuan}</td>
                        <td style="font-weight:700; color:var(--primary)">${item.qty}</td>
                        <td style="font-size: 0.8rem; color:var(--text-dim);">
                            ${new Date(item.tanggal).toLocaleDateString('id-ID')}
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error(err);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ff3e3e;">DATABASE ERROR: Pastikan tabel 'data_${dept}' sudah dibuat di Supabase.</td></tr>`;
            }
        }

        // --- NAVIGASI SIDEBAR ---
        function toggleDept(dept) {
            currentDept = dept;
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dept-label').forEach(l => l.classList.remove('active'));
            
            document.getElementById(`menu-${dept}`).classList.add('show');
            document.getElementById(`label-${dept}`).classList.add('active');
            document.getElementById('view-title').innerText = "Terminal " + dept.toUpperCase();
            
            fetchManifests(dept);
        }
    </script>
</body>
</html>

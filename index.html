<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBM TRANSPORTIR | Core System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0066ff;
            --bg-dark: #020617;
            --glass: rgba(7, 15, 30, 0.9);
            --glass-border: rgba(0, 242, 255, 0.15);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed; inset: 0; background: #020617;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--glass); padding: 3rem; border-radius: 25px;
            border: 1px solid var(--glass-border); width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        .login-card input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5); color: var(--primary); font-size: 1.5rem;
            text-align: center; margin-bottom: 1.5rem; outline: none;
        }
        .login-card button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            color: white; font-weight: 800; cursor: pointer; transition: transform 0.2s;
        }
        .login-card button:active { transform: scale(0.98); }

        /* --- LAYOUT --- */
        nav {
            width: 260px; background: var(--glass); height: 100vh; position: fixed;
            border-right: 1px solid var(--glass-border); padding: 2rem 1rem;
        }
        main { margin-left: 260px; padding: 2rem; }
        
        .dept-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; cursor: pointer; color: var(--text-dim); font-weight: 700;
            margin-top: 10px; border-radius: 10px; transition: 0.3s;
        }
        .dept-btn.active { background: rgba(0, 242, 255, 0.1); color: var(--primary); }
        
        .sub-menu { padding-left: 20px; display: none; margin-top: 5px; }
        .sub-menu.active { display: block; }
        .sub-item { 
            padding: 8px; font-size: 0.85rem; color: var(--text-dim); cursor: pointer; 
            display: flex; align-items: center; gap: 8px;
        }
        .sub-item:hover { color: var(--primary); }

        .glass-panel {
            background: var(--glass); border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--glass-border); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 12px; color: var(--primary); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .hidden { display: none !important; }
        .nopol-box { background: #1e293b; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <i data-lucide="shield-check" style="color: var(--primary); width: 50px; height: 50px; margin-bottom: 1rem;"></i>
            <h2 style="margin-bottom: 1.5rem;">ADMIN LOGIN</h2>
            <input type="password" id="pin-input" placeholder="Masukkan PIN" maxlength="6" onkeypress="if(event.key==='Enter') checkLogin()">
            <button onclick="checkLogin()">MASUK DASHBOARD</button>
            <p id="err-msg" style="color: #ff4747; margin-top: 15px; font-size: 0.9rem; font-weight: 600; display: none;">⚠️ PIN Salah atau Tidak Lengkap!</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav>
            <h2 style="color: var(--primary); margin-bottom: 2rem; font-size: 1.2rem;">BBM LOGISTICS</h2>
            
            <div class="dept-btn" id="btn-ikaen" onclick="toggleDept('ikaen')">IKAEN <i data-lucide="chevron-down"></i></div>
            <div class="sub-menu" id="menu-ikaen">
                <div class="sub-item" onclick="location.href='sj_ikaen.html'"><i data-lucide="file"></i> Surat Jalan</div>
                <div class="sub-item" onclick="location.href='memo_ikaen.html'"><i data-lucide="mail"></i> Memo</div>
                <div class="sub-item" onclick="location.href='ba_oper_ikaen.html'"><i data-lucide="upload"></i> BA Oper</div>
                <div class="sub-item" onclick="location.href='ba_trm_ikaen.html'"><i data-lucide="download"></i> BA Terima</div>
            </div>

            <div class="dept-btn" id="btn-ide" onclick="toggleDept('ide')">IDE <i data-lucide="chevron-down"></i></div>
            <div class="sub-menu" id="menu-ide">
                <div class="sub-item" onclick="location.href='sj_ide.html'"><i data-lucide="file"></i> Surat Jalan</div>
                <div class="sub-item" onclick="location.href='memo_ide.html'"><i data-lucide="mail"></i> Memo</div>
                <div class="sub-item" onclick="location.href='ba_oper_ide.html'"><i data-lucide="upload"></i> BA Oper</div>
                <div class="sub-item" onclick="location.href='ba_trm_ide.html'"><i data-lucide="download"></i> BA Terima</div>
            </div>

            <div class="dept-btn" id="btn-kse" onclick="toggleDept('kse')">KSE <i data-lucide="chevron-down"></i></div>
            <div class="sub-menu" id="menu-kse">
                <div class="sub-item" onclick="location.href='sj_kse.html'"><i data-lucide="file"></i> Surat Jalan</div>
                <div class="sub-item" onclick="location.href='memo_kse.html'"><i data-lucide="mail"></i> Memo</div>
                <div class="sub-item" onclick="location.href='ba_oper_kse.html'"><i data-lucide="upload"></i> BA Oper</div>
                <div class="sub-item" onclick="location.href='ba_trm_kse.html'"><i data-lucide="download"></i> BA Terima</div>
            </div>
        </nav>

        <main>
            <h1 id="view-title" style="margin-bottom: 1.5rem;">Dashboard IKAEN</h1>
            <div class="glass-panel">
                <table>
                    <thead>
                        <tr>
                            <th>TANGGAL</th>
                            <th>NO. SJ</th>
                            <th>NO. MEMO</th>
                            <th>NO. BA (OPR/TRM)</th>
                            <th>NOPOL</th>
                            <th>SOPIR</th>
                            <th>TUJUAN</th>
                            <th>QTY (L)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="8" style="text-align:center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- 1. KONFIGURASI SUPABASE ---
        const SB_URL = "ISI_DENGAN_URL_SUPABASE_ANDA"; 
        const SB_KEY = "ISI_DENGAN_ANON_KEY_SUPABASE_ANDA";
        
        let supabase;
        let currentDept = 'ikaen';

        // Inisialisasi Supabase
        window.onload = () => {
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SB_URL, SB_KEY);
                }
            } catch (e) {
                console.error("Gagal inisialisasi Supabase:", e);
            }
            lucide.createIcons();
        };

        // --- 2. PERBAIKAN FUNGSI LOGIN ---
        function checkLogin() {
            const pinInput = document.getElementById('pin-input');
            const errMsg = document.getElementById('err-msg');
            const overlay = document.getElementById('login-overlay');
            const appContent = document.getElementById('app-content');

            // Validasi PIN (Sesuai kode awal: 123456)
            if (pinInput.value === '123456') {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    appContent.classList.remove('hidden');
                    // Refresh icon setelah konten muncul
                    lucide.createIcons();
                    loadData();
                }, 300);
            } else {
                errMsg.style.display = 'block';
                pinInput.value = '';
                pinInput.focus();
            }
        }

        // --- 3. NAVIGATION ---
        function toggleDept(dept) {
            currentDept = dept;
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`menu-${dept}`).classList.add('active');
            document.getElementById(`btn-${dept}`).classList.add('active');
            document.getElementById('view-title').innerText = `Dashboard ${dept.toUpperCase()}`;
            
            loadData();
        }

        // --- 4. LOAD DATA ---
        async function loadData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">Sinkronisasi Database...</td></tr>';

            if (!supabase || SB_URL === "ISI_DENGAN_URL_SUPABASE_ANDA") {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#ffb0b0">Konfigurasi Supabase belum diatur.</td></tr>';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('logistik')
                    .select('*')
                    .eq('dept', currentDept)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">Tidak ada data untuk departemen ini.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(row => `
                    <tr>
                        <td>${new Date(row.created_at).toLocaleDateString('id-ID')}</td>
                        <td style="color:var(--primary); font-weight:bold">${row.no_sj || '-'}</td>
                        <td>${row.no_memo || '-'}</td>
                        <td>
                            <div style="font-size:0.7rem">OPR: ${row.no_ba_oper || '-'}</div>
                            <div style="font-size:0.7rem; color:var(--primary)">TRM: ${row.no_ba_terima || '-'}</div>
                        </td>
                        <td><span class="nopol-box">${row.nopol || '-'}</span></td>
                        <td>${row.nama_sopir || '-'}</td>
                        <td>${row.tujuan || '-'}</td>
                        <td><b style="color:white">${Number(row.qty || 0).toLocaleString()} L</b></td>
                    </tr>
                `).join('');

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:red">Gagal Memuat: ${err.message}</td></tr>`;
            }
        }
    </script>
</body>
</html>

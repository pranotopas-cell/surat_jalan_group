<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DELIVERY | Enterprise Suite </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #2563eb;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.4);
            --navy: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            min-height: 100vh;
            color: var(--navy);
            /* Background Mesh Gradient Bergerak */
            background: linear-gradient(45deg, #e0e7ff, #f1f5f9, #dbeafe, #e8e8e8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .login-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            padding: 4rem; border-radius: 45px; width: 520px; 
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6);
            text-align: center;
        }

        /* Vendor Logos Grid */
        .vendor-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            align-items: center; margin-bottom: 2.5rem; background: rgba(255,255,255,0.4);
            padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.5);
        }
        .vendor-logo { width: 100%; height: 55px; object-fit: contain; }

        .login-card input {
            width: 100%; padding: 20px; border-radius: 22px; border: 1px solid #cbd5e1;
            margin-bottom: 1.5rem; background: white; font-size: 1.3rem; 
            text-align: center; font-weight: 800; outline: none;
        }

        /* --- DASHBOARD STRUCTURE --- */
        #app-shell { display: flex; min-height: 100vh; }
        
        nav {
            width: 300px; background: rgba(255,255,255,0.6); backdrop-filter: blur(25px);
            border-right: 1px solid var(--border); padding: 3rem 1.5rem; 
            height: 100vh; position: fixed; display: flex; flex-direction: column;
        }

        .logo-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 4rem; font-weight: 800; font-size: 1.4rem; color: var(--accent); }
        
        .menu-item {
            display: flex; align-items: center; padding: 18px 24px; margin-bottom: 1rem;
            cursor: pointer; border-radius: 22px; color: var(--text-muted); transition: 0.4s; font-weight: 700;
        }
        .menu-item:hover { background: rgba(255,255,255,0.9); color: var(--accent); transform: translateX(8px); }
        .menu-item.active { background: var(--accent); color: white; box-shadow: 0 15px 30px -10px rgba(37, 99, 235, 0.4); }

        main { flex: 1; margin-left: 300px; padding: 4.5rem; }

        .header-content { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
        .header-content h1 { font-size: 3rem; font-weight: 800; letter-spacing: -2.5px; }

        .btn-main {
            background: var(--accent); color: white; border: none; padding: 20px 40px;
            border-radius: 22px; font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 12px;
        }
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -10px rgba(37, 99, 235, 0.3); }

        /* --- TABLE --- */
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(30px);
            border-radius: 40px; padding: 3rem; border: 1px solid var(--border);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { padding: 0 20px 10px; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; text-align: left; }
        td { padding: 25px 20px; background: rgba(255,255,255,0.4); font-weight: 700; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); border-radius: 0; }
        td:first-child { border-radius: 25px 0 0 25px; border-left: 1px solid var(--border); }
        td:last-child { border-radius: 0 25px 25px 0; border-right: 1px solid var(--border); }

        .badge { background: #dcfce7; color: #15803d; padding: 8px 18px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 2.5rem;">Secure Access</h2>
            
            <div class="vendor-grid">
                <img src="ikaen.png" alt="Ikaen" class="vendor-logo">
                <img src="header1.png" alt="Header" class="vendor-logo">
                <img src="ide1.png" alt="IDE" class="vendor-logo">
            </div>

            <input type="password" id="pass-input" placeholder="ACCESS PIN">
            <button onclick="handleLogin()" class="btn-main" style="width: 100%; justify-content: center;">Sign In</button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav>
            <div class="logo-nav">
                <i data-lucide="shield-check" style="fill: var(--accent); color: white;"></i>
                <span>DELIVERY SYSTEM</span>
            </div>
            
            <div class="menu-item active" id="m-ikaen" onclick="switchDept('ikaen')">
                <i data-lucide="layers" style="margin-right:15px"></i> SJ IKAEN
            </div>
            <div class="menu-item" id="m-kse" onclick="switchDept('kse')">
                <i data-lucide="truck" style="margin-right:15px"></i> SJ KSE
            </div>
            <div class="menu-item" id="m-ide" onclick="switchDept('ide')">
                <i data-lucide="database" style="margin-right:15px"></i> SJ IDE
            </div>

            <div style="margin-top: auto;">
                <div class="menu-item" onclick="location.reload()" style="color: #ef4444; background: rgba(239, 68, 68, 0.08);">
                    <i data-lucide="power" style="margin-right:15px"></i> Logout
                </div>
            </div>
        </nav>

        <main>
            <div class="header-content">
                <div>
                    <h1 id="dept-title">Surat Jalan IKAEN</h1>
                    <p style="color: var(--text-muted); font-weight: 700; margin-top: 10px;">Monitor 10 Transaksi Terakhir</p>
                </div>
                <button onclick="goToForm()" class="btn-main">
                    <i data-lucide="plus-circle"></i> Buat Baru
                </button>
            </div>

            <div class="glass-panel">
                <table>
                    <thead>
                        <tr>
                            <th>Manifest ID</th>
                            <th>Tanggal</th>
                            <th>Driver</th>
                            <th>Tujuan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="manifest-table">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let activeDept = 'ikaen';

        function handleLogin() {
            if(document.getElementById('pass-input').value === 'admin123') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                renderManifest();
            } else { alert('Akses Ditolak!'); }
        }

        function switchDept(dept) {
            activeDept = dept;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(`m-${dept}`).classList.add('active');
            document.getElementById('dept-title').innerText = "Surat Jalan " + dept.toUpperCase();
            renderManifest();
        }

        // FUNGSI INI AKAN MEMBUKA FILE SESUAI MENU YANG AKTIF
        function goToForm() {
            // Jika aktif di Ikaen, buka sj_ikaen.html
            // Jika aktif di KSE, buka sj_kse.html
            // Jika aktif di IDE, buka sj_ide.html
            window.location.href = `sj_${activeDept}.html`;
        }

        function renderManifest() {
            const data = JSON.parse(localStorage.getItem(`db_${activeDept}`)) || [];
            const recentData = data.slice(-10).reverse();
            const tableBody = document.getElementById('manifest-table');
            
            if(recentData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:5rem; opacity:0.5;">Belum ada riwayat data.</td></tr>`;
            } else {
                tableBody.innerHTML = recentData.map(item => `
                    <tr>
                        <td style="color: var(--accent)">#${item.no || '---'}</td>
                        <td>${item.tgl || '---'}</td>
                        <td>${item.driver || '---'}</td>
                        <td>${item.tujuan || '---'}</td>
                        <td><span class="badge">RECORDED</span></td>
                    </tr>
                `).join('');
            }
        }

        window.onload = renderManifest;
    </script>
</body>
</html>

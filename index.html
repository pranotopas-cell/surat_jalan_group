<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistik Dashboard - IKAEN/IDE/KSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans" x-data="appData()">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-blue-900">
            <div class="bg-white p-8 rounded-lg shadow-xl w-96">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Sistem Logistik</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium">Username</label>
                        <input type="text" x-model="loginForm.user" class="w-full border p-2 rounded mt-1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Password</label>
                        <input type="password" x-model="loginForm.pass" class="w-full border p-2 rounded mt-1">
                    </div>
                    <button @click="login()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Login</button>
                    <p x-show="error" class="text-red-500 text-xs mt-2" x-text="error"></p>
                </div>
            </div>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="min-h-screen flex flex-col">
            <nav class="bg-slate-800 text-white shadow-lg">
                <div class="max-w-7xl mx-auto px-4">
                    <div class="flex justify-between items-center h-16">
                        <div class="flex items-center space-x-8">
                            <span class="font-bold text-xl tracking-wider text-blue-400">LOG-SYS</span>
                            
                            <template x-for="menu in menus" :key="menu">
                                <div class="relative group" x-data="{ open: false }">
                                    <button @click="open = !open" @click.away="open = false" class="hover:text-blue-300 px-3 py-2 rounded-md text-sm font-medium flex items-center">
                                        <span x-text="menu"></span>
                                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </button>
                                    <div x-show="open" class="absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50">
                                        <div class="py-1">
                                            <template x-for="item in subMenus" :key="item">
                                                <a href="#" @click="selectView(menu, item); open = false" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600" x-text="item"></a>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <button @click="logout()" class="text-sm bg-red-600 px-4 py-1 rounded hover:bg-red-700">Logout</button>
                    </div>
                </div>
            </nav>

            <main class="flex-1 p-6">
                <div class="max-w-7xl mx-auto">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-800" x-text="currentEntity"></h1>
                            <p class="text-gray-500" x-text="'Data Laporan: ' + currentSubMenu"></p>
                        </div>
                        <button @click="fetchData()" class="bg-emerald-500 text-white px-4 py-2 rounded-md hover:bg-emerald-600 text-sm">Refresh Data</button>
                    </div>

                    <div class="bg-white rounded-xl shadow overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No. SJ / Memo</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nopol / Sopir</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tujuan</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Qty</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status BA</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <template x-for="row in tableData" :key="row.id">
                                        <tr class="hover:bg-gray-50 transition">
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="row.tanggal"></td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <div class="text-sm font-semibold text-gray-900" x-text="row.no_sj"></div>
                                                <div class="text-xs text-gray-400" x-text="'Memo: ' + row.no_memo"></div>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <div class="text-sm text-gray-900" x-text="row.nopol"></div>
                                                <div class="text-xs text-gray-500" x-text="row.nama_sopir"></div>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="row.tujuan"></td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs font-bold" x-text="row.qty"></span>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-xs">
                                                <div class="text-gray-600" x-text="'Masuk: ' + row.ba_penerimaan"></div>
                                                <div class="text-gray-600" x-text="'Muat: ' + row.ba_oper_muat"></div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                            <template x-if="tableData.length === 0">
                                <div class="p-10 text-center text-gray-400">Memuat data dari Supabase...</div>
                            </template>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_PUBLIC_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function appData() {
            return {
                isLoggedIn: false,
                loginForm: { user: '', pass: '' },
                error: '',
                currentEntity: 'IKAEN',
                currentSubMenu: 'Surat Jalan',
                menus: ['IKAEN', 'IDE', 'KSE'],
                subMenus: ['Surat Jalan', 'Memo', 'BA Penerimaan', 'BA Oper Muat Tangki'],
                tableData: [],

                login() {
                    if (this.loginForm.user === 'admin' && this.loginForm.pass === 'admin123') {
                        this.isLoggedIn = true;
                        this.fetchData();
                    } else {
                        this.error = 'Login gagal! Cek username & password.';
                    }
                },

                logout() {
                    this.isLoggedIn = false;
                    this.loginForm = { user: '', pass: '' };
                },

                selectView(menu, sub) {
                    this.currentEntity = menu;
                    this.currentSubMenu = sub;
                    this.fetchData();
                },

                async fetchData() {
                    // Logika filter data berdasarkan Entity (IKAEN/IDE/KSE)
                    // Pastikan tabel di Supabase Anda memiliki kolom 'entitas' (IKAEN/IDE/KSE)
                    try {
                        let { data, error } = await supabase
                            .from('logistik_data') // Nama tabel di supabase anda
                            .select('*')
                            .eq('entitas', this.currentEntity)
                            .order('tanggal', { ascending: false });

                        if (error) throw error;
                        this.tableData = data || [];
                    } catch (err) {
                        console.error('Error fetching:', err.message);
                        // Data dummy jika koneksi gagal untuk keperluan demo tampilan
                        this.tableData = [
                            { id: 1, tanggal: '2023-10-27', no_sj: 'SJ-001', no_memo: 'M-99', nopol: 'B 1234 ABC', tujuan: 'Jakarta', nama_sopir: 'Budi', qty: '5000L', ba_penerimaan: 'BA-RCV-01', ba_oper_muat: 'BA-LOAD-01' }
                        ];
                    }
                }
            }
        }
    </script>
</body>
</html>

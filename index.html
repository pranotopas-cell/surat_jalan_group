<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DELIVERY | Cyber Logistics </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00f2ff; /* Electric Tosca */
            --secondary: #0066ff;
            --bg-dark: #020617;
            --glass: rgba(7, 15, 30, 0.85);
            --glass-border: rgba(0, 242, 255, 0.15);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* --- SIDEBAR --- */
        nav {
            width: 280px; background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border); padding: 2rem 1rem; 
            height: 100vh; position: fixed; z-index: 1000;
        }

        .logo-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 3rem; font-weight: 800; color: var(--primary); }
        
        .dept-group { margin-bottom: 1rem; }
        .dept-label { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; cursor: pointer; border-radius: 12px;
            color: var(--text-dim); font-weight: 700; transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .dept-label.active { color: var(--primary); background: rgba(0,242,255,0.05); border-left: 3px solid var(--primary); }

        .sub-menu { padding-left: 10px; display: none; margin-top: 5px; }
        .sub-menu.show { display: block; }

        .sub-item {
            display: flex; align-items: center; padding: 10px 15px; margin-top: 2px;
            cursor: pointer; border-radius: 8px; color: var(--text-dim);
            font-size: 0.85rem; font-weight: 600; transition: 0.2s;
        }
        .sub-item:hover { color: var(--primary); background: rgba(0,242,255,0.05); transform: translateX(5px); }
        .sub-item i { margin-right: 10px; width: 14px; }

        /* --- CONTENT --- */
        main { margin-left: 280px; padding: 3rem; }
        .glass-panel {
            background: var(--glass); border-radius: 24px; padding: 1.5rem; 
            border: 1px solid var(--glass-border); overflow-x: auto;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 1000px; }
        th { padding: 12px 15px; color: var(--primary); font-size: 0.65rem; text-transform: uppercase; text-align: left; letter-spacing: 1px; }
        td { padding: 15px; background: rgba(255,255,255,0.02); font-size: 0.85rem; color: var(--text-main); border-top: 1px solid rgba(255,255,255,0.03); }
        
        .badge-qty { background: var(--secondary); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay" style="position:fixed; inset:0; background:var(--bg-dark); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; background:var(--glass); padding:3rem; border-radius:30px; border:1px solid var(--glass-border); width:400px;">
            <i data-lucide="lock" style="color:var(--primary); margin-bottom:1rem;"></i>
            <h2 style="margin-bottom:1.5rem;">LOGISTICS ACCESS</h2>
            <input type="password" id="pass-input" placeholder="PIN" style="width:100%; padding:15px; border-radius:12px; background:black; border:1px solid var(--glass-border); color:var(--primary); text-align:center; font-weight:800; margin-bottom:1rem;">
            <button onclick="handleLogin()" style="width:100%; padding:15px; border-radius:12px; background:var(--primary); border:none; font-weight:800; cursor:pointer;">LOGIN SYSTEM</button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav>
            <div class="logo-nav"><i data-lucide="box"></i> CYBER.SUITE</div>
            
            <div id="nav-container"></div>
        </nav>

        <main>
            <div style="margin-bottom: 2rem;">
                <h1 id="view-title" style="font-size: 2rem;">Dashboard IKAEN</h1>
                <p id="view-subtitle" style="color: var(--text-dim);">Monitoring Real-time Database Supabase</p>
            </div>

            <div class="glass-panel">
                <table>
                    <thead>
                        <tr>
                            <th>Tgl / Jam</th>
                            <th>No. Manifest / SJ</th>
                            <th>No. Memo</th>
                            <th>BA Oper / Terima</th>
                            <th>Nopol</th>
                            <th>Sopir</th>
                            <th>Tujuan</th>
                            <th>Qty (L)</th>
                        </tr>
                    </thead>
                    <tbody id="manifest-table"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SB_URL = "URL_SUPABASE_ANDA";
        const SB_KEY = "ANON_KEY_ANDA";
        const supabase =维持.createClient(SB_URL, SB_KEY);
        
        const depts = ['ikaen', 'ide', 'kse'];
        let currentDept = 'ikaen';

        // --- RENDER SIDEBAR ---
        const navContainer = document.getElementById('nav-container');
        depts.forEach(pt => {
            navContainer.innerHTML += `
                <div class="dept-group">
                    <div class="dept-label" id="label-${pt}" onclick="toggleDept('${pt}')">
                        <span>${pt.toUpperCase()}</span> <i data-lucide="chevron-down" size="14"></i>
                    </div>
                    <div class="sub-menu" id="menu-${pt}">
                        <div class="sub-item" onclick="goTo('${pt}', 'sj')"><i data-lucide="file-text"></i> Surat Jalan</div>
                        <div class="sub-item" onclick="goTo('${pt}', 'ba_terima')"><i data-lucide="check-circle"></i> BA Terima</div>
                        <div class="sub-item" onclick="goTo('${pt}', 'ba_oper')"><i data-lucide="refresh-ccw"></i> BA Oper</div>
                        <div class="sub-item" onclick="goTo('${pt}', 'memo')"><i data-lucide="mail"></i> Memo</div>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();

        // --- FUNCTIONS ---
        function handleLogin() {
            if(document.getElementById('pass-input').value === 'admin123') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                toggleDept('ikaen');
            }
        }

        function toggleDept(pt) {
            currentDept = pt;
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dept-label').forEach(l => l.classList.remove('active'));
            document.getElementById(`menu-${pt}`).classList.add('show');
            document.getElementById(`label-${pt}`).classList.add('active');
            document.getElementById('view-title').innerText = `Dashboard ${pt.toUpperCase()}`;
            fetchData();
        }

        function goTo(pt, type) {
            // Mengarah ke file sesuai permintaan: sj_ikaen.html, memo_ide.html, dll.
            window.location.href = `${type}_${pt}.html`;
        }

        async function fetchData() {
            const tableBody = document.getElementById('manifest-table');
            tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:3rem;">Loading encrypted data...</td></tr>`;

            const { data, error } = await supabase
                .from('manifests')
                .select('*')
                .eq('dept', currentDept)
                .order('created_at', { ascending: false });

            if (error || !data) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">Connection Error</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map(item => `
                <tr>
                    <td style="font-size:0.75rem; color:var(--text-dim)">${new Date(item.created_at).toLocaleString('id-ID')}</td>
                    <td><b style="color:var(--primary)">${item.no_manifest || '-'}</b></td>
                    <td>${item.no_memo || '-'}</td>
                    <td>
                        <div style="font-size:0.75rem">Opr: ${item.no_ba_oper || '-'}</div>
                        <div style="font-size:0.75rem">Trm: ${item.no_ba_terima || '-'}</div>
                    </td>
                    <td><span style="background:#1e293b; padding:4px 8px; border-radius:5px;">${item.nopol || '-'}</span></td>
                    <td style="color:white">${item.driver_name || '-'}</td>
                    <td>${item.destination || '-'}</td>
                    <td><span class="badge-qty">${item.qty || '0'}</span></td>
                </tr>
            `).join('');
        }

        // Realtime Refresh
        supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'manifests' }, () => {
            fetchData();
        }).subscribe();
    </script>
</body>
</html>

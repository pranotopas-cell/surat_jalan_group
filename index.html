<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DELIVERY | Enterprise Suite </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #2563eb;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.4);
            --navy: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            min-height: 100vh;
            color: var(--navy);
            /* Background Mesh Gradient yang Hidup */
            background: linear-gradient(45deg, #e0e7ff, #f1f5f9, #dbeafe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LOGIN SECTION (PREMIUM) --- */
        #login-overlay {
            position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .login-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 3.5rem; border-radius: 40px; width: 480px; 
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Penataan Logo Header & Vendor */
        .logo-header { width: 180px; margin-bottom: 2rem; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        
        .vendor-grid {
            display: flex; justify-content: center; align-items: center;
            gap: 25px; margin-bottom: 2.5rem; background: rgba(255,255,255,0.4);
            padding: 15px; border-radius: 20px;
        }
        .vendor-logo { height: 45px; width: auto; object-fit: contain; opacity: 0.9; transition: 0.3s; }
        .vendor-logo:hover { transform: scale(1.1); opacity: 1; }

        .login-card input {
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #cbd5e1;
            margin-bottom: 1.5rem; background: rgba(255,255,255,0.8);
            font-size: 1.1rem; text-align: center; font-weight: 600; outline: none;
            transition: 0.3s;
        }
        .login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

        /* --- DASHBOARD LAYOUT --- */
        #app-shell { display: flex; min-height: 100vh; }
        
        nav {
            width: 280px; background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2.5rem 1.5rem; height: 100vh; position: fixed; display: flex; flex-direction: column;
        }

        .logo-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 3.5rem; font-weight: 800; font-size: 1.4rem; color: var(--accent); }
        
        .menu-item {
            display: flex; align-items: center; padding: 15px 20px; margin-bottom: 0.8rem;
            cursor: pointer; border-radius: 20px; color: #64748b; transition: 0.3s; font-weight: 700;
        }
        .menu-item:hover { background: rgba(255,255,255,0.8); color: var(--accent); transform: translateX(5px); }
        .menu-item.active { background: var(--accent); color: white; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; margin-left: 280px; padding: 4rem; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 2.5rem; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .btn-main {
            background: var(--accent); color: white; border: none; padding: 18px 35px;
            border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; margin-top: 1.5rem; }
        th { padding: 15px; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; text-align: left; }
        td { padding: 20px 15px; background: rgba(255,255,255,0.4); font-weight: 600; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-radius: 20px 0 0 20px; border-left: 1px solid var(--border); }
        td:last-child { border-radius: 0 20px 20px 0; border-right: 1px solid var(--border); }

        .badge { background: #dcfce7; color: #15803d; padding: 6px 14px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            
            <p style="color: var(--navy); font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem;">Authorized Access Only</p>
            
            <div class="vendor-grid">
                <img src="ikaen.png" alt="Ikaen" class="vendor-logo">
                <img src="header1.png" alt="KSE" class="vendor-logo">
                <img src="ide1.png" alt="IDE" class="vendor-logo">
            </div>

            <input type="password" id="pass-input" placeholder="Enter Secure Pin">
            <button onclick="handleLogin()" class="btn-main" style="width: 100%; justify-content: center;">Sign In to System</button>
            <p style="margin-top: 1.5rem; font-size: 0.75rem; color: #64748b; font-weight: 600;">© 2026 Fleet Management System</p>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav>
            <div class="logo-nav">
                <i data-lucide="shield-check" style="fill: var(--accent); color: white;"></i>
                <span>DELIVERY ENTERPRISE</span>
            </div>
            
            <div class="menu-item active" id="m-ikaen" onclick="switchDept('ikaen')">
                <i data-lucide="layers" style="margin-right:12px"></i> SJ Ikaen
            </div>
            <div class="menu-item" id="m-kse" onclick="switchDept('kse')">
                <i data-lucide="truck" style="margin-right:12px"></i> SJ KSE
            </div>
            <div class="menu-item" id="m-ide" onclick="switchDept('ide')">
                <i data-lucide="database" style="margin-right:12px"></i> SJ IDE
            </div>

            <div style="margin-top: auto;">
                <div class="menu-item" onclick="location.reload()" style="color: #ef4444; background: rgba(239, 68, 68, 0.05);">
                    <i data-lucide="power" style="margin-right:12px"></i> Shutdown
                </div>
            </div>
        </nav>

        <main>
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
                <div>
                    <h1 id="dept-title" style="font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px;">Surat Jalan Ikaen</h1>
                    <p style="color: #64748b; font-weight: 600;">Dashboard pemantauan 10 transaksi terakhir</p>
                </div>
                <button onclick="goToForm()" class="btn-main">
                    <i data-lucide="plus-circle"></i> Create New Manifest
                </button>
            </div>

            <div class="glass-panel">
                <table>
                    <thead>
                        <tr>
                            <th>No. Surat Jalan</th>
                            <th>Tanggal Terbit</th>
                            <th>Nama Driver</th>
                            <th>Lokasi Tujuan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="manifest-table">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let activeDept = 'ikaen';

        function handleLogin() {
            if(document.getElementById('pass-input').value === 'admin123') {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    renderManifest();
                }, 500);
            } else { alert('Access Denied: Invalid Credentials'); }
        }

        function switchDept(dept) {
            activeDept = dept;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(`m-${dept}`).classList.add('active');
            document.getElementById('dept-title').innerText = "Surat Jalan " + dept.toUpperCase();
            renderManifest();
        }

        function goToForm() {
            window.location.href = `sj_${activeDept}.html`;
        }

        function renderManifest() {
            const data = JSON.parse(localStorage.getItem(`db_${activeDept}`)) || [];
            const recentData = data.slice(-10).reverse();
            const tableBody = document.getElementById('manifest-table');
            
            if(recentData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:5rem; color:#94a3b8;">No recent manifests found in database.</td></tr>`;
            } else {
                tableBody.innerHTML = recentData.map(item => `
                    <tr>
                        <td style="color: var(--accent); font-weight: 800;">#${item.no || '---'}</td>
                        <td>${item.tgl || '---'}</td>
                        <td>${item.driver || '---'}</td>
                        <td>${item.tujuan || '---'}</td>
                        <td><span class="badge">RECORDED</span></td>
                    </tr>
                `).join('');
            }
        }

        window.onload = renderManifest;
    </script>
</body>
</html>

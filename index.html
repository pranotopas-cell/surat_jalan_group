<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DELIVERY | Enterprise Suite </title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #2563eb;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.4);
            --navy: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            min-height: 100vh;
            color: var(--navy);
            background: linear-gradient(45deg, #e0e7ff, #f1f5f9, #dbeafe, #e8e8e8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .login-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            padding: 4rem; border-radius: 45px; width: 520px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6);
        }

        .vendor-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            margin-bottom: 2rem; background: rgba(255,255,255,0.4); padding: 20px; border-radius: 25px;
        }

        .vendor-logo { width: 100%; height: 50px; object-fit: contain; }

        /* --- DASHBOARD STRUCTURE --- */
        #app-shell { display: flex; min-height: 100vh; }
        
        nav {
            width: 280px; background: rgba(255,255,255,0.6); backdrop-filter: blur(25px);
            border-right: 1px solid var(--border); padding: 2.5rem 1.5rem; height: 100vh; position: fixed; display: flex; flex-direction: column;
        }

        .menu-item {
            display: flex; align-items: center; padding: 16px 20px; margin-bottom: 0.8rem;
            cursor: pointer; border-radius: 18px; color: var(--text-muted); font-weight: 700; transition: 0.3s;
        }
        .menu-item.active { background: var(--accent); color: white; box-shadow: 0 10px 20px -5px rgba(37,99,235,0.3); }

        main { flex: 1; margin-left: 280px; padding: 4rem; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(30px);
            border-radius: 35px; padding: 2.5rem; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        /* --- FORM & INPUT --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select {
            padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1;
            font-size: 1rem; font-weight: 600; background: white;
        }

        .btn-main {
            background: var(--accent); color: white; border: none; padding: 18px 30px;
            border-radius: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* --- TABLE --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        td { padding: 20px; background: rgba(255,255,255,0.4); font-weight: 700; border-radius: 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 2rem;">System Authentication</h2>
            <div class="vendor-grid">
                <img src="ikaen.png" class="vendor-logo">
                <img src="header1.png" class="vendor-logo">
                <img src="ide1.png" class="vendor-logo">
            </div>
            <input type="password" id="pass-input" placeholder="ENTER ACCESS PIN">
            <button onclick="handleLogin()" class="btn-main" style="width:100%; justify-content:center;">Authorize</button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav>
            <div style="font-weight:800; color:var(--accent); margin-bottom:3rem; font-size:1.2rem;">DELIVERY.PRO</div>
            <div class="menu-item active" id="m-ikaen" onclick="switchDept('ikaen')"><i data-lucide="layers" style="margin-right:12px"></i> SJ IKAEN</div>
            <div class="menu-item" id="m-kse" onclick="switchDept('kse')"><i data-lucide="truck" style="margin-right:12px"></i> SJ KSE</div>
            <div class="menu-item" id="m-ide" onclick="switchDept('ide')"><i data-lucide="database" style="margin-right:12px"></i> SJ IDE</div>
            <div class="menu-item" onclick="location.reload()" style="margin-top:auto; color:#ef4444;"><i data-lucide="power" style="margin-right:12px"></i> Logout</div>
        </nav>

        <main>
            <div id="view-list">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:3rem;">
                    <div>
                        <h1 id="dept-title">Surat Jalan IKAEN</h1>
                        <p style="color:var(--text-muted); font-weight:600;">10 Transaksi Terakhir</p>
                    </div>
                    <button onclick="showForm()" class="btn-main"><i data-lucide="plus-circle"></i> Buat Baru</button>
                </div>
                <div class="glass-panel">
                    <table>
                        <thead>
                            <tr style="text-align:left; color:var(--text-muted); font-size:0.8rem;">
                                <th>NO. SURAT JALAN</th>
                                <th>TANGGAL</th>
                                <th>DRIVER</th>
                                <th>TUJUAN</th>
                            </tr>
                        </thead>
                        <tbody id="manifest-table"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-form" class="hidden">
                <div style="margin-bottom:2rem;">
                    <button onclick="showList()" style="background:none; border:none; cursor:pointer; font-weight:800; color:var(--accent); display:flex; align-items:center; gap:8px;">
                        <i data-lucide="arrow-left"></i> Kembali ke Dashboard
                    </button>
                    <h1 id="form-title" style="margin-top:1rem;">Input Surat Jalan Baru</h1>
                </div>
                <div class="glass-panel">
                    <form id="sj-form">
                        <div class="form-grid">
                            <div class="input-group">
                                <label>Nomor Surat Jalan</label>
                                <input type="text" id="f-no" required placeholder="Contoh: SJ-001">
                            </div>
                            <div class="input-group">
                                <label>Tanggal</label>
                                <input type="date" id="f-tgl" required>
                            </div>
                            <div class="input-group">
                                <label>Nama Driver</label>
                                <input type="text" id="f-driver" required placeholder="Nama Lengkap">
                            </div>
                            <div class="input-group">
                                <label>Lokasi Tujuan</label>
                                <input type="text" id="f-tujuan" required placeholder="Nama Site/Gudang">
                            </div>
                        </div>
                        <button type="submit" class="btn-main" style="margin-top:30px; width:100%; justify-content:center;">
                            <i data-lucide="save"></i> Simpan Manifest
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let activeDept = 'ikaen';

        // LOGIN
        function handleLogin() {
            if(document.getElementById('pass-input').value === 'admin123') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                renderManifest();
            } else { alert('Pin Salah!'); }
        }

        // NAVIGATION
        function switchDept(dept) {
            activeDept = dept;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(`m-${dept}`).classList.add('active');
            document.getElementById('dept-title').innerText = "Surat Jalan " + dept.toUpperCase();
            showList();
        }

        function showForm() {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Input SJ Baru - " + activeDept.toUpperCase();
            document.getElementById('sj-form').reset();
        }

        function showList() {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
            renderManifest();
        }

        // SAVE DATA
        document.getElementById('sj-form').onsubmit = function(e) {
            e.preventDefault();
            const newData = {
                no: document.getElementById('f-no').value,
                tgl: document.getElementById('f-tgl').value,
                driver: document.getElementById('f-driver').value,
                tujuan: document.getElementById('f-tujuan').value
            };

            let storageKey = `db_${activeDept}`;
            let dataList = JSON.parse(localStorage.getItem(storageKey)) || [];
            dataList.push(newData);
            localStorage.setItem(storageKey, JSON.stringify(dataList));

            alert('Data berhasil disimpan ke sistem ' + activeDept.toUpperCase());
            showList();
        };

        // RENDER TABLE
        function renderManifest() {
            const data = JSON.parse(localStorage.getItem(`db_${activeDept}`)) || [];
            const recentData = data.slice(-10).reverse();
            const tableBody = document.getElementById('manifest-table');
            
            if(recentData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:3rem; opacity:0.5;">Belum ada data manifest.</td></tr>`;
            } else {
                tableBody.innerHTML = recentData.map(item => `
                    <tr>
                        <td style="color:var(--accent)">#${item.no}</td>
                        <td>${item.tgl}</td>
                        <td>${item.driver}</td>
                        <td>${item.tujuan}</td>
                    </tr>
                `).join('');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Integrated Delivery System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --ide-dark: #0f172a;
            --sidebar-width: 280px;
            /* Definisi Warna Brand */
            --color-ikaen: #dc3545; /* Merah */
            --color-ide: #0d6efd;   /* Biru */
            --color-kse: #14532d;   /* Hijau Tua */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
        }

        .sidebar { 
            background: var(--ide-dark); 
            height: 100vh; 
            color: white; 
            padding: 1.5rem 1rem; 
            position: fixed; 
            width: var(--sidebar-width); 
            z-index: 1000; 
        }

        .nav-link { 
            color: rgba(255,255,255,0.7); 
            border-radius: 0.75rem; 
            padding: 0.7rem 1rem; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            font-size: 0.85rem; 
        }

        .pt-label { 
            font-size: 0.65rem; 
            color: #38bdf8; 
            padding: 1.2rem 1rem 0.4rem; 
            display: block; 
            font-weight: 700;
        }

        .main-content { margin-left: var(--sidebar-width); padding: 2.5rem; }

        /* Kustomisasi Tabel & Teks */
        .table { font-size: 0.72rem; } /* Teks diperkecil agar muat 1 kolom */
        .table thead th { 
            background: #f1f5f9; 
            font-size: 0.65rem; 
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Utility Classes untuk Warna PT */
        .txt-ikaen { color: var(--color-ikaen) !important; }
        .bg-ikaen { background-color: var(--color-ikaen) !important; color: white !important; }

        .txt-ide { color: var(--color-ide) !important; }
        .bg-ide { background-color: var(--color-ide) !important; color: white !important; }

        .txt-kse { color: var(--color-kse) !important; }
        .bg-kse { background-color: var(--color-kse) !important; color: white !important; }

        .badge-pt { font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; font-weight: 800; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="card p-5 border-0 shadow-lg text-center mx-auto mt-5" style="max-width: 400px; border-radius: 2rem;">
        <h3 class="fw-bold mb-4">ADMIN ACCESS</h3>
        <input type="text" id="user" class="form-control mb-3" placeholder="Username">
        <input type="password" id="pass" class="form-control mb-4" placeholder="Password">
        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="handleLogin()">LOGIN SYSTEM</button>
        <p id="error-msg" class="text-danger mt-3 small" style="display:none;">Akses Ditolak!</p>
    </div>
</div>

<div id="dashboard-page" style="display:none;">
    <aside class="sidebar d-flex flex-column">
        <div class="mb-4 px-3 d-flex align-items-center">
            <i class="bi bi-shield-check text-info fs-3 me-2"></i>
            <h6 class="fw-bold mb-0 text-white">INTEGRATED SYSTEM</h6>
        </div>
        <nav class="flex-grow-1">
            <small class="pt-label">PT. INVESTAMA KALIMANTAN ENERGI</small>
            <a class="nav-link text-white opacity-75"><i class="bi bi-building me-2"></i> IKAEN</a>
            <small class="pt-label">PT. INDO DHARMA ENERGI</small>
            <a class="nav-link text-white opacity-75"><i class="bi bi-lightning-charge me-2"></i> IDE</a>
            <small class="pt-label">PT. KHATULISTIWA SINAR ENERGI</small>
            <a class="nav-link text-white opacity-75"><i class="bi bi-fire me-2"></i> KSE</a>
        </nav>
        <a href="javascript:void(0)" onclick="handleLogout()" class="nav-link text-danger border-top border-secondary pt-3 mt-auto">
            <i class="bi bi-power me-2"></i> Sign Out
        </a>
    </aside>

    <main class="main-content">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 1.5rem;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="fw-bold mb-0"><i class="bi bi-rss me-2 text-primary"></i>Delivery Feed Logistik</h6>
                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="fetchLogistikData()">Sync</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>IDENTITAS</th>
                            <th>NO. DOKUMEN</th>
                            <th>JENIS</th>
                            <th>TUJUAN</th>
                            <th>SOPIR / NOPOL</th>
                            <th class="text-end">QTY (L)</th>
                        </tr>
                    </thead>
                    <tbody id="logistik-table-body">
                        <tr><td colspan="6" class="text-center py-4">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const SB_URL = "https://ntaectphgoelmhzrkatp.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function fetchLogistikData() {
        const tbody = document.getElementById('logistik-table-body');
        try {
            const { data, error } = await _supabase.from('data_logistik').select('*').order('created_at', { ascending: false });
            if (error) throw error;

            let html = '';
            data.forEach(row => {
                let ptClass = 'bg-secondary';
                let textClass = 'text-dark';
                const ptName = (row.pt || '').trim().toUpperCase();

                // Logika Warna Berdasarkan Instruksi
                if (ptName === 'IKAEN') {
                    ptClass = 'bg-ikaen';
                    textClass = 'txt-ikaen';
                } else if (ptName === 'IDE') {
                    ptClass = 'bg-ide';
                    textClass = 'txt-ide';
                } else if (ptName === 'KSE') {
                    ptClass = 'bg-kse';
                    textClass = 'txt-kse';
                }

                html += `
                    <tr>
                        <td style="white-space: nowrap;">
                            <div class="fw-bold" style="font-size:0.65rem">${row.tanggal || '-'}</div>
                            <span class="badge badge-pt ${ptClass}">${ptName}</span>
                        </td>
                        <td class="fw-bold ${textClass}">${row.no_dokumen || '-'}</td>
                        <td class="text-secondary fw-bold">${row.jenis_dokumen || '-'}</td>
                        <td><div class="text-truncate" style="max-width:120px;">${row.tujuan || '-'}</div></td>
                        <td>
                            <div class="fw-bold">${row.sopir || '-'}</div>
                            <div class="text-muted" style="font-size:0.6rem">${row.nopol || '-'}</div>
                        </td>
                        <td class="text-end fw-bold">${(row.qty || 0).toLocaleString('id-ID')}</td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Gagal memuat data</td></tr>`;
        }
    }

    function handleLogin() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "kse123") {
            localStorage.setItem('ide_session', 'active');
            showDashboard();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function showDashboard() {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        fetchLogistikData();
    }

    function handleLogout() { localStorage.removeItem('ide_session'); location.reload(); }
    window.onload = () => { if (localStorage.getItem('ide_session') === 'active') showDashboard(); };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGISTIC.PRO | Enterprise All-in-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #10b981;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* --- UTILITY --- */
        .hidden { display: none !important; }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .login-card { background: var(--white); padding: 3rem; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        /* --- LAYOUT --- */
        #app-shell { display: flex; min-height: 100vh; }
        nav { width: var(--sidebar-width); background: var(--primary); color: white; padding: 2rem 1.2rem; height: 100vh; position: fixed; display: flex; flex-direction: column; z-index: 100; }
        main { flex: 1; margin-left: var(--sidebar-width); padding: 2.5rem; transition: 0.3s; }

        /* --- SIDEBAR MENU --- */
        .logo { font-weight: 800; font-size: 1.3rem; margin-bottom: 3rem; color: var(--accent); padding-left: 10px; }
        .menu-item { display: flex; align-items: center; padding: 12px 16px; margin-bottom: 0.5rem; cursor: pointer; border-radius: 10px; color: #94a3b8; transition: 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .menu-item.active { background: var(--accent); color: white; }

        /* --- HEADER & BUTTONS --- */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .btn { padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; border: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }

        /* --- CARDS & TABLES --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-box { background: var(--white); padding: 1.5rem; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-box h2 { font-size: 1.8rem; color: var(--primary); margin-top: 5px; }

        .content-card { background: var(--white); padding: 2rem; border-radius: 15px; border: 1px solid #e2e8f0; min-height: 450px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #f1f5f9; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .status-badge { background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; }

        /* --- FORM STYLING --- */
        .form-view { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 1rem; }
        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #eff6ff; }

        .empty-state { text-align: center; padding: 5rem 0; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <i data-lucide="shield-check" style="width: 50px; height: 50px; color: var(--accent); margin-bottom: 1rem;"></i>
            <h2>Enterprise Login</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Secure Logistics Management System</p>
            <input type="password" id="login-pass" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:1rem;" placeholder="Password Admin">
            <button onclick="handleLogin()" class="btn btn-primary" style="width:100%; justify-content:center;">Akses Dashboard</button>
            <p id="login-error" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">Password Salah!</p>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <nav>
            <div class="logo">LOGISTIC.PRO</div>
            <div class="menu-item active" id="m-ikaen" onclick="navTo('ikaen')"><i data-lucide="package" style="margin-right:12px"></i> SJ Ikaen</div>
            <div class="menu-item" id="m-kse" onclick="navTo('kse')"><i data-lucide="truck" style="margin-right:12px"></i> SJ KSE</div>
            <div class="menu-item" id="m-ide" onclick="navTo('ide')"><i data-lucide="file-text" style="margin-right:12px"></i> SJ IDE</div>
            <div style="margin-top: auto;" class="menu-item" onclick="location.reload()"><i data-lucide="log-out" style="margin-right:12px"></i> Logout</div>
        </nav>

        <main>
            <div id="view-dashboard">
                <header>
                    <div>
                        <h1 id="header-title">Surat Jalan Ikaen</h1>
                        <p id="header-subtitle" style="color: var(--text-muted)">Manajemen manifest pengiriman</p>
                    </div>
                    <button onclick="showForm()" class="btn btn-primary"><i data-lucide="plus"></i> Buat Baru</button>
                </header>

                <div class="stats-grid">
                    <div class="stat-box"><small>Total Dokumen</small><h2 id="stat-total">0</h2></div>
                    <div class="stat-box"><small>Status Pending</small><h2 id="stat-pending" style="color: #f59e0b;">0</h2></div>
                    <div class="stat-box"><small>Status Selesai</small><h2 style="color: var(--success);">0</h2></div>
                </div>

                <div class="content-card">
                    <div id="table-render-area">
                        </div>
                </div>
            </div>

            <div id="view-form" class="hidden">
                <div class="form-view">
                    <header>
                        <h2>Input Surat Jalan <span id="form-dept-name" style="color: var(--accent);"></span></h2>
                        <button onclick="showDashboard()" class="btn btn-secondary">Batal</button>
                    </header>
                    
                    <div class="content-card" style="min-height: auto;">
                        <form id="main-form">
                            <div class="form-group">
                                <label>Nomor Surat Jalan</label>
                                <input type="text" id="in-no" required placeholder="Contoh: SJ/IKN/001">
                            </div>
                            <div class="form-group">
                                <label>Tanggal Pengiriman</label>
                                <input type="date" id="in-tgl" required>
                            </div>
                            <div class="form-group">
                                <label>Tujuan Lokasi</label>
                                <input type="text" id="in-tujuan" required placeholder="Gudang / Kota Tujuan">
                            </div>
                            <div class="form-group">
                                <label>Nama Driver</label>
                                <input type="text" id="in-driver" required placeholder="Nama Lengkap Sopir">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 15px;">Simpan Manifest</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // STATE MANAGEMENT
        let currentDept = 'ikaen';

        // 1. LOGIN LOGIC
        function handleLogin() {
            const pass = document.getElementById('login-pass').value;
            if(pass === 'admin123') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                refreshUI();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // 2. NAVIGATION LOGIC
        function navTo(dept) {
            currentDept = dept;
            // Update Menu Active
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`m-${dept}`).classList.add('active');
            
            showDashboard();
            refreshUI();
        }

        function showForm() {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
            document.getElementById('form-dept-name').innerText = currentDept.toUpperCase();
            
            // Reset Form & Auto-fill No SJ
            document.getElementById('main-form').reset();
            const year = new Date().getFullYear();
            document.getElementById('in-no').value = `SJ/${currentDept.toUpperCase()}/${year}/00${Math.floor(Math.random()*9)+1}`;
        }

        function showDashboard() {
            document.getElementById('view-form').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
        }

        // 3. DATA STORAGE LOGIC (LOCALSTORAGE)
        function refreshUI() {
            // Update Header
            document.getElementById('header-title').innerText = "Surat Jalan " + currentDept.toUpperCase();
            
            // Get Data
            const data = JSON.parse(localStorage.getItem(`data_${currentDept}`)) || [];
            
            // Update Stats
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-pending').innerText = data.length; // Simulasi semua baru masuk = pending

            // Render Table
            const renderArea = document.getElementById('table-render-area');
            if(data.length === 0) {
                renderArea.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="inbox" style="width: 48px; height: 48px; opacity: 0.2; margin-bottom: 1rem;"></i>
                        <p>Belum ada manifest tercatat untuk ${currentDept.toUpperCase()}</p>
                    </div>`;
            } else {
                let html = `<table><thead><tr><th>No. SJ</th><th>Tanggal</th><th>Tujuan</th><th>Driver</th><th>Status</th></tr></thead><tbody>`;
                data.forEach(item => {
                    html += `<tr>
                        <td style="font-weight:700">${item.no}</td>
                        <td>${item.tgl}</td>
                        <td>${item.tujuan}</td>
                        <td>${item.driver}</td>
                        <td><span class="status-badge">PENDING</span></td>
                    </tr>`;
                });
                renderArea.innerHTML = html + `</tbody></table>`;
            }
            lucide.createIcons();
        }

        // 4. FORM SUBMIT LOGIC
        document.getElementById('main-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newItem = {
                no: document.getElementById('in-no').value,
                tgl: document.getElementById('in-tgl').value,
                tujuan: document.getElementById('in-tujuan').value,
                driver: document.getElementById('in-driver').value
            };

            const data = JSON.parse(localStorage.getItem(`data_${currentDept}`)) || [];
            data.unshift(newItem); // Tambah ke paling atas
            localStorage.setItem(`data_${currentDept}`, JSON.stringify(data));

            alert('Manifest Berhasil Disimpan!');
            showDashboard();
            refreshUI();
        });
    </script>
</body>
</html>
